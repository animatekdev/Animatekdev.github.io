<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch P2P Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; padding: 15px; color: #1a202c; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: 10px auto; }
        .btn { background: #4a90e2; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-bottom: 10px; transition: 0.2s; }
        .btn-send { background: #48bb78; display: none; }
        .btn-scan { background: #6c5ce7; }
        .btn:disabled { background: #cbd5e0; cursor: not-allowed; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: none; background: #000; }
        .progress-container { display: none; margin-top: 20px; text-align: left; }
        .progress-bg { background: #edf2f7; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: #48bb78; height: 100%; width: 0%; transition: width 0.1s; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #cbd5e0; box-sizing: border-box; text-align: center; }
        #status-msg { font-size: 0.8rem; color: #e53e3e; margin-top: 5px; min-height: 1em; }
        #download-link { display: block; margin-top: 20px; padding: 15px; background: #d3f9d8; color: #2b8a3e; border-radius: 12px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 Touch Share</h2>
        <div id="qrcode"></div>
        <p>Il tuo ID: <strong id="my-id">Inizializzazione...</strong></p>
        
        <div id="reader"></div>
        <button id="scan-btn" class="btn btn-scan">📷 1. Scansiona QR</button>
        <input type="text" id="peer-id-input" placeholder="ID Destinatario">
        
        <hr style="border:0; border-top:1px solid #eee; margin: 15px 0;">

        <button class="btn" onclick="document.getElementById('file-input').click()">📁 2. Scegli File</button>
        <input type="file" id="file-input" hidden>
        
        <div id="file-info" style="font-size: 0.85rem; margin-bottom: 10px;">Nessun file selezionato</div>
        <button id="send-btn" class="btn btn-send">📤 3. Invia Ora</button>
        <div id="status-msg"></div>

        <div id="progress-area" class="progress-container">
            <span id="progress-label">Trasferimento...</span>
            <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
            <span id="progress-percent" style="font-size: 0.8rem; float: right;">0%</span>
        </div>
        <div id="download-area"></div>
    </div>

<script>
    // Configurazione ICE per migliorare la connessione su reti mobili
    const peer = new Peer(null, {
        debug: 2,
        config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:global.stun.twilio.com:3478' }]}
    });

    const peerInput = document.getElementById("peer-id-input");
    const fileInput = document.getElementById("file-input");
    const sendBtn = document.getElementById("send-btn");
    const statusMsg = document.getElementById("status-msg");
    const progressArea = document.getElementById("progress-area");
    const html5QrCode = new Html5Qrcode("reader");

    let selectedFile = null;

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        const shareUrl = `${window.location.origin}${window.location.pathname}?target=${id}`;
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: shareUrl, width: 140, height: 140 });
    });

    peer.on('error', err => {
        statusMsg.innerText = "Errore PeerJS: " + err.type;
        console.error(err);
    });

    // RICEZIONE
    peer.on('connection', conn => {
        let receivedChunks = [];
        let metadata = {};
        conn.on('data', data => {
            if (data.type === 'start') {
                progressArea.style.display = 'block';
                receivedChunks = [];
                metadata = { name: data.name, mime: data.mime };
            } else if (data.type === 'chunk') {
                receivedChunks.push(data.payload);
                document.getElementById("progress-fill").style.width = Math.floor((data.current/data.total)*100) + "%";
            } else if (data.type === 'end') {
                const blob = new Blob(receivedChunks, { type: metadata.mime });
                showDownload(URL.createObjectURL(blob), metadata.name);
                progressArea.style.display = 'none';
                new Audio('https://actions.google.com/sounds/v1/communication/notification_high_intensity.ogg').play().catch(()=>{});
            }
        });
    });

    fileInput.onchange = (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            document.getElementById("file-info").innerText = "File pronto: " + selectedFile.name;
            sendBtn.style.display = 'block';
        }
    };

    // INVIO
    sendBtn.onclick = () => {
        const targetId = peerInput.value.trim();
        if (!selectedFile || !targetId) return alert("Inserisci ID o scansiona QR");

        sendBtn.disabled = true;
        sendBtn.innerText = "Connessione...";
        statusMsg.innerText = "Tentativo di connessione...";

        const conn = peer.connect(targetId, { reliable: true });

        // Timeout di sicurezza
        const connectionTimeout = setTimeout(() => {
            if (sendBtn.disabled && sendBtn.innerText === "Connessione...") {
                statusMsg.innerText = "Connessione fallita. Riprova (usa stessa Wi-Fi se possibile)";
                sendBtn.disabled = false;
                sendBtn.innerText = "📤 3. Invia Ora";
            }
        }, 8000);

        conn.on('open', () => {
            clearTimeout(connectionTimeout);
            statusMsg.innerText = "Connesso! Invio in corso...";
            sendBtn.innerText = "Inviando...";
            progressArea.style.display = 'block';
            
            let offset = 0;
            const chunkSize = 16384 * 2;
            conn.send({ type: 'start', name: selectedFile.name, mime: selectedFile.type });

            const readSlice = () => {
                if (offset >= selectedFile.size) {
                    conn.send({ type: 'end' });
                    progressArea.style.display = 'none';
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Inviato!";
                    return;
                }

                if (conn.dataChannel.bufferedAmount > 1024 * 1024) {
                    setTimeout(readSlice, 50);
                    return;
                }

                const slice = selectedFile.slice(offset, offset + chunkSize);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    conn.send({ type: 'chunk', payload: ev.target.result, current: offset + ev.target.result.byteLength, total: selectedFile.size });
                    offset += chunkSize;
                    document.getElementById("progress-fill").style.width = Math.floor((Math.min(offset, selectedFile.size)/selectedFile.size)*100) + "%";
                    readSlice();
                };
                reader.readAsArrayBuffer(slice);
            };
            readSlice();
        });
    };

    function showDownload(url, name) {
        document.getElementById('download-area').innerHTML = `<a id="download-link" href="${url}" download="${name}">🎁 Scarica: ${name}</a>`;
    }

    document.getElementById('scan-btn').onclick = () => {
        document.getElementById('reader').style.display = 'block';
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            try { peerInput.value = new URL(text).searchParams.get("target") || text; } catch { peerInput.value = text; }
            html5QrCode.stop().then(() => document.getElementById('reader').style.display = 'none');
        });
    };
</script>
</body>
</html>
