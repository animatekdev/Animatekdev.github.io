<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch P2P Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; padding: 15px; color: #1a202c; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: 10px auto; }
        .btn { background: #4a90e2; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-bottom: 10px; transition: 0.2s; }
        .btn-send { background: #48bb78; display: none; } /* Nascosto finché non c'è un file */
        .btn-scan { background: #6c5ce7; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: none; background: #000; }
        .progress-container { display: none; margin-top: 20px; text-align: left; }
        .progress-bg { background: #edf2f7; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: #48bb78; height: 100%; width: 0%; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #cbd5e0; box-sizing: border-box; text-align: center; }
        #file-info { font-size: 0.85rem; color: #4a5568; margin-bottom: 10px; }
        #download-link { display: block; margin-top: 20px; padding: 15px; background: #d3f9d8; color: #2b8a3e; border-radius: 12px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 Touch Share</h2>
        <div id="qrcode"></div>
        <p>Il tuo ID: <strong id="my-id">...</strong></p>
        
        <div id="reader"></div>
        <button id="scan-btn" class="btn btn-scan">📷 1. Scansiona QR</button>
        <input type="text" id="peer-id-input" placeholder="ID Destinatario">
        
        <hr style="border:0; border-top:1px solid #eee; margin: 15px 0;">

        <button class="btn" onclick="document.getElementById('file-input').click()">📁 2. Scegli File</button>
        <input type="file" id="file-input" hidden>
        
        <div id="file-info">Nessun file selezionato</div>
        <button id="send-btn" class="btn btn-send">📤 3. Invia Ora</button>

        <div id="progress-area" class="progress-container">
            <span id="progress-label">Trasferimento...</span>
            <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
            <span id="progress-percent" style="font-size: 0.8rem; float: right;">0%</span>
        </div>
        <div id="download-area"></div>
    </div>

<script>
    const peer = new Peer();
    const peerInput = document.getElementById("peer-id-input");
    const fileInput = document.getElementById("file-input");
    const fileInfo = document.getElementById("file-info");
    const sendBtn = document.getElementById("send-btn");
    const progressArea = document.getElementById("progress-area");
    const progressFill = document.getElementById("progress-fill");
    const progressPercent = document.getElementById("progress-percent");
    const html5QrCode = new Html5Qrcode("reader");

    let selectedFile = null;

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        const shareUrl = `${window.location.origin}${window.location.pathname}?target=${id}`;
        new QRCode(document.getElementById("qrcode"), { text: shareUrl, width: 140, height: 140 });
    });

    // RICEZIONE
    peer.on('connection', conn => {
        let receivedChunks = [];
        let metadata = {};
        conn.on('data', data => {
            if (data.type === 'start') {
                progressArea.style.display = 'block';
                receivedChunks = [];
                metadata = { name: data.name, mime: data.mime };
            } else if (data.type === 'chunk') {
                receivedChunks.push(data.payload);
                updateProgress(Math.floor((data.current / data.total) * 100));
            } else if (data.type === 'end') {
                const blob = new Blob(receivedChunks, { type: metadata.mime || 'application/octet-stream' });
                showDownload(URL.createObjectURL(blob), metadata.name);
                progressArea.style.display = 'none';
                new Audio('https://actions.google.com/sounds/v1/communication/notification_high_intensity.ogg').play().catch(()=>{});
            }
        });
    });

    // SELEZIONE FILE
    fileInput.onchange = (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            fileInfo.innerText = `File: ${selectedFile.name} (${(selectedFile.size/1024/1024).toFixed(2)} MB)`;
            sendBtn.style.display = 'block';
        }
    };

    // INVIO FILE
    sendBtn.onclick = () => {
        const targetId = peerInput.value;
        if (!selectedFile || !targetId) return alert("Seleziona file e scansiona destinatario!");

        sendBtn.disabled = true;
        sendBtn.innerText = "Connessione...";
        
        const conn = peer.connect(targetId, { reliable: true });

        conn.on('open', () => {
            sendBtn.innerText = "Inviando...";
            progressArea.style.display = 'block';
            let offset = 0;
            const chunkSize = 16384 * 2;
            
            conn.send({ type: 'start', name: selectedFile.name, mime: selectedFile.type });

            const readSlice = () => {
                if (offset >= selectedFile.size) {
                    conn.send({ type: 'end' });
                    progressArea.style.display = 'none';
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Inviato!";
                    setTimeout(() => { sendBtn.innerText = "📤 3. Invia Ora"; }, 2000);
                    return;
                }

                if (conn.dataChannel.bufferedAmount > 1024 * 1024) {
                    setTimeout(readSlice, 50);
                    return;
                }

                const slice = selectedFile.slice(offset, offset + chunkSize);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    conn.send({ 
                        type: 'chunk', 
                        payload: ev.target.result, 
                        current: offset + ev.target.result.byteLength, 
                        total: selectedFile.size 
                    });
                    offset += chunkSize;
                    updateProgress(Math.floor((Math.min(offset, selectedFile.size) / selectedFile.size) * 100));
                    readSlice();
                };
                reader.readAsArrayBuffer(slice);
            };
            readSlice();
        });

        conn.on('error', (err) => {
            alert("Errore di connessione!");
            sendBtn.disabled = false;
            sendBtn.innerText = "📤 3. Invia Ora";
        });
    };

    function updateProgress(p) {
        progressFill.style.width = p + "%";
        progressPercent.innerText = p + "%";
    }

    function showDownload(url, name) {
        const area = document.getElementById('download-area');
        area.innerHTML = `<a id="download-link" href="${url}" download="${name}">🎁 Scarica: ${name}</a>`;
    }

    document.getElementById('scan-btn').onclick = () => {
        document.getElementById('reader').style.display = 'block';
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            try { peerInput.value = new URL(text).searchParams.get("target") || text; } 
            catch { peerInput.value = text; }
            html5QrCode.stop().then(() => document.getElementById('reader').style.display = 'none');
        });
    };
</script>
</body>
</html>
